name: Test Project

# Trigger the workflow on pull requests to the MAIN branch
on:
  pull_request:           
    branches:
      - main              

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4   # v4 is the latest one.

      # Clean install (CI) dependencies based on package-lock.json
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Build the project (from package.json -> "build")
      - name: Build
        run: npm run build